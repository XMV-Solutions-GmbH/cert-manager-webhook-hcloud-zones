#
# Certificate exercising Hetzner project B — first zone.
#
# - dnsName  : app-b1-${RUN_ID}.${HARNESS_ZONE_B1}
# - issuer   : harness-le-staging (LE staging via this webhook)
# - solver   : Project B credential (matched by `dnsZones` in the
#              ClusterIssuer).
# - secret   : app-b1-tls (referenced by the Ingress).
#
# Paired with certificate-b2 it proves the "one token, multiple
# zones" path inside a single Hetzner project.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-b1
  labels:
    app: harness-test-app
    app.kubernetes.io/managed-by: cert-manager-webhook-hcloud-zones-harness
    harness.cert-manager-webhook-hcloud-zones.example.com/project: b
spec:
  secretName: app-b1-tls
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days
  issuerRef:
    name: harness-le-staging
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: app-b1-${RUN_ID}.${HARNESS_ZONE_B1}
  dnsNames:
    - app-b1-${RUN_ID}.${HARNESS_ZONE_B1}
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
