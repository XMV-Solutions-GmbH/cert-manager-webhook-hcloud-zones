#
# ClusterIssuer for Let's Encrypt STAGING. Production endpoint is
# intentionally never referenced from the harness (rate limits +
# audit-log concerns — see issue #2 § Out of scope).
#
# Two `apiTokenSecretRef` entries are declared via dnsZones selectors,
# one per Hetzner Cloud project:
#
#   - Project A credential (Secret `hcloud-token-project-a`) issues
#     for `${HARNESS_ZONE_A}` and its subdomains.
#   - Project B credential (Secret `hcloud-token-project-b`) issues
#     for both `${HARNESS_ZONE_B1}` and `${HARNESS_ZONE_B2}` —
#     exercising the "one token, multiple zones" path within a single
#     project.
#
# The two Secrets themselves are created by `tests/harness/run.sh`
# from environment variables at harness runtime; they are NOT part of
# this manifest set (sub-task 2-2's territory).
#
# `groupName` is the webhook's ACME solver group name and is
# operator-configurable at chart install time. The placeholder
# `acme.example.com` matches the chart's default and should be
# overridden in `run.sh` if the operator has installed the webhook
# with a different `--set groupName=...`. See the chart's values.yaml
# for the authoritative default.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: harness-le-staging
  labels:
    app.kubernetes.io/managed-by: cert-manager-webhook-hcloud-zones-harness
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: harness@example.com
    privateKeySecretRef:
      name: harness-le-staging-account-key
    solvers:
      - dnsZones:
          - ${HARNESS_ZONE_A}
        dns01:
          webhook:
            groupName: acme.example.com
            solverName: hcloud-zones
            config:
              apiTokenSecretRef:
                name: hcloud-token-project-a
                key: token
      - dnsZones:
          - ${HARNESS_ZONE_B1}
          - ${HARNESS_ZONE_B2}
        dns01:
          webhook:
            groupName: acme.example.com
            solverName: hcloud-zones
            config:
              apiTokenSecretRef:
                name: hcloud-token-project-b
                key: token
