#
# ClusterIssuer for Let's Encrypt STAGING. Production endpoint is
# intentionally never referenced from the harness (rate limits +
# audit-log concerns — see issue #2 § Out of scope).
#
# Schema follows docs/app-concept.md § 3.2 — a single `webhook.config`
# block carries a `credentials` LIST. Routing inside the webhook picks
# the credential whose `zones` list contains the challenge FQDN's
# zone-apex, so an outer `selector.dnsZones` is NOT needed (and would
# in fact prevent cross-zone routing from a single Issuer).
#
# Two credentials are declared, exercising the multi-project path:
#   - project-a — Secret `hcloud-token-project-a`, authoritative for
#     `${HARNESS_ZONE_A}` (Hetzner project A).
#   - project-b — Secret `hcloud-token-project-b`, authoritative for
#     `${HARNESS_ZONE_B1}` AND `${HARNESS_ZONE_B2}` (single token,
#     two zones in the same project).
#
# The two Secrets themselves are created by `tests/harness/run.sh`
# from environment variables at harness runtime.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: harness-le-staging
  labels:
    app.kubernetes.io/managed-by: cert-manager-webhook-hcloud-zones-harness
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: harness@xmv.de
    privateKeySecretRef:
      name: harness-le-staging-account-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.hcloud-zones.xmv.de
            solverName: hcloud-zones
            config:
              credentials:
                - name: project-a
                  zones:
                    - ${HARNESS_ZONE_A}
                  apiTokenSecretRef:
                    name: hcloud-token-project-a
                    key: token
                  namespace: cert-manager
                - name: project-b
                  zones:
                    - ${HARNESS_ZONE_B1}
                    - ${HARNESS_ZONE_B2}
                  apiTokenSecretRef:
                    name: hcloud-token-project-b
                    key: token
                  namespace: cert-manager
