{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cert-manager-webhook-hcloud-zones.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cert-manager-webhook-hcloud-zones.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cert-manager-webhook-hcloud-zones.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # cert-manager (aggregated via the kube-apiserver) reaches the webhook on
    # the HTTPS service port. We allow any source on that port because the
    # apiserver IP is not stable enough to encode in a NetworkPolicy.
    - ports:
        - protocol: TCP
          port: 8443
  egress:
    # Cluster DNS — required to resolve `api.hetzner.cloud`.
    - to:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.dnsNamespaceSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API server — the webhook framework talks to it for authn,
    # authz and Secret lookups. We allow all egress on 443 and 6443 rather
    # than try to encode the apiserver Service IP, which differs per cluster.
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
