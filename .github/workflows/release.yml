# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Release pipeline — triggered on every v* tag push.
#
# Jobs:
#   build-and-push  — multi-arch (amd64 + arm64) image to GHCR; outputs digest + image ref
#   sign            — cosign keyless signature (Sigstore) via digest
#   sbom            — SBOM attached to the GHCR image via anchore/sbom-action
#   publish-chart   — Helm chart packaged and pushed to GHCR OCI
#   github-release  — GitHub Release with auto-generated notes
#
# The workflow does not modify ci.yml or any Go source.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image ref
        id: image
        run: echo "ref=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sign:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image by digest
        run: |
          cosign sign --yes \
            ${{ needs.build-and-push.outputs.image }}@${{ needs.build-and-push.outputs.digest }}

  sbom:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # anchore/sbom-action@v0 only uploads the SBOM as a GitHub Actions
      # workflow artifact — it does NOT push it to the OCI registry. We
      # capture the SBOM to a file here so the next step can attest it
      # to the image. Keeping registry-username/registry-password is a
      # no-op for the artifact upload but harmless.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build-and-push.outputs.image }}@${{ needs.build-and-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      # Push the SBOM into the registry as an OCI referrer of the image,
      # signed keyless via Sigstore. Same identity / OIDC chain as the
      # `sign` job, so `cosign verify-attestation` (and the referrers
      # API: GET /v2/.../referrers/sha256:<digest>) returns this SBOM
      # alongside the image signature.
      - name: Attest SBOM to image
        run: |
          cosign attest --yes --type spdxjson \
            --predicate sbom.spdx.json \
            ${{ needs.build-and-push.outputs.image }}@${{ needs.build-and-push.outputs.digest }}

  publish-chart:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR (OCI)
        run: |
          helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: |
          VERSION="${{ github.ref_name }}"
          helm package charts/cert-manager-webhook-hcloud-zones \
            --version "${VERSION#v}" \
            --app-version "${VERSION#v}"

      - name: Push Helm chart to GHCR
        run: |
          helm push cert-manager-webhook-hcloud-zones-*.tgz \
            oci://ghcr.io/${{ env.OWNER_LC }}/charts

  github-release:
    needs: [sign, sbom, publish-chart]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
